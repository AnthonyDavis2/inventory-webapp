name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: '11.9.0'
  NODE_VERSION: '24'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - run: pnpm lint

      - run: pnpm type-check

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inventory_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inventory_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: test-access-secret-minimum-32-characters
      JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-characters
      NODE_ENV: test
      PORT: 3001
      APP_URL: http://localhost:3000
      API_URL: http://localhost:3001
      STRIPE_SECRET_KEY: ci_no_stripe
      STRIPE_PUBLISHABLE_KEY: ci_no_stripe
      STRIPE_WEBHOOK_SECRET: ci_no_stripe
      STRIPE_STARTER_PRICE_ID: ci_no_stripe
      STRIPE_GROWTH_PRICE_ID: ci_no_stripe
      STRIPE_BUSINESS_PRICE_ID: ci_no_stripe
      RESEND_API_KEY: ci_no_resend
      RESEND_FROM_EMAIL: test@example.com
      R2_ACCOUNT_ID: ci_no_r2
      R2_ACCESS_KEY_ID: ci_no_r2
      R2_SECRET_ACCESS_KEY: ci_no_r2
      R2_BUCKET_NAME: ci_no_r2
      R2_PUBLIC_URL: http://localhost:9000
      GOTENBERG_URL: http://localhost:3002
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run migrations
        run: pnpm db:migrate:prod

      - name: Run unit tests
        run: pnpm --filter backend test

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Nuxt types
        run: pnpm --filter frontend exec nuxt prepare

      - run: pnpm --filter frontend test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-backend, test-frontend]
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inventory_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: build-access-secret-minimum-32-characters
      JWT_REFRESH_SECRET: build-refresh-secret-minimum-32-characters
      NODE_ENV: production
      PORT: 3001
      APP_URL: http://localhost:3000
      API_URL: http://localhost:3001
      STRIPE_SECRET_KEY: ci_no_stripe
      STRIPE_PUBLISHABLE_KEY: ci_no_stripe
      STRIPE_WEBHOOK_SECRET: ci_no_stripe
      STRIPE_STARTER_PRICE_ID: ci_no_stripe
      STRIPE_GROWTH_PRICE_ID: ci_no_stripe
      STRIPE_BUSINESS_PRICE_ID: ci_no_stripe
      RESEND_API_KEY: ci_no_resend
      RESEND_FROM_EMAIL: build@example.com
      R2_ACCOUNT_ID: ci_no_r2
      R2_ACCESS_KEY_ID: ci_no_r2
      R2_SECRET_ACCESS_KEY: ci_no_r2
      R2_BUCKET_NAME: ci_no_r2
      R2_PUBLIC_URL: http://localhost:9000
      GOTENBERG_URL: http://localhost:3002
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - run: pnpm build

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          pnpm exec railway up --service=backend --environment=staging --detach

      - name: Deploy frontend to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          pnpm exec vercel deploy --prod --token=$VERCEL_TOKEN --yes \
            --build-env NUXT_PUBLIC_API_URL=${{ secrets.STAGING_API_URL }}
